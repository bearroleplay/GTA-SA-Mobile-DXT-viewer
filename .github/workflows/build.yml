name: Build DXTViewer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile with MinGW
        working-directory: src
        run: |
          g++ --version
          g++ -O2 -static main.cpp updater.cpp archive.cpp dxt.cpp gui.cpp logger.cpp -lgdiplus -lwinhttp -lshlwapi -o DXTViewer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXTViewer-${{ github.sha }}
          path: src/DXTViewer.exe
          retention-days: 7
