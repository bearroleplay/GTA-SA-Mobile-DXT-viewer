name: Build DXTViewer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Show structure
        run: |
          Get-ChildItem -Recurse -Name

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile
        run: |
          cd src
          cl /O2 /EHsc /Fe:DXTViewer.exe ^
            main.cpp ^
            updater.cpp ^
            archive.cpp ^
            dxt.cpp ^
            gui.cpp ^
            logger.cpp ^
            /link gdiplus.lib winhttp.lib shlwapi.lib user32.lib gdi32.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXTViewer-${{ github.sha }}
          path: src/DXTViewer.exe
          retention-days: 7
