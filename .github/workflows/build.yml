name: Build DXTViewer (Test)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: |
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Compile
        shell: msys2 {0}
        run: |
          g++ -O2 -static \
            main.cpp updater.cpp archive.cpp dxt.cpp gui.cpp logger.cpp \
            -lgdiplus -lwinhttp -lshlwapi -o DXTViewer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXTViewer-${{ github.sha }}
          path: DXTViewer.exe
          retention-days: 7
