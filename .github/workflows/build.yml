name: Build DXTViewer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile with MinGW
        run: |
          g++ --version
          g++ -std=c++17 -O2 -mwindows -DUNICODE -D_UNICODE ^
            src\main.cpp ^
            src\logger.cpp ^
            src\archive.cpp ^
            src\dxt.cpp ^
            src\updater.cpp ^
            src\gui.cpp ^
            -o DXTViewer.exe ^
            -lgdi32 -lgdiplus -lcomctl32 -lcomdlg32 -lwinhttp -lshell32 -luuid -lole32 -lpthread

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXTViewer-${{ github.sha }}
          path: DXTViewer.exe
          retention-days: 7
