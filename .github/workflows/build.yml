name: Build DXTViewer (Test)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files
        run: |
          dir
          echo "=== Checking for .cpp files ==="
          dir *.cpp

      - name: Compile with MinGW
        run: |
          g++ --version
          g++ -O2 -static -std=c++17 ^
            main.cpp updater.cpp archive.cpp dxt.cpp gui.cpp logger.cpp ^
            -lgdiplus -lwinhttp -lshlwapi -o DXTViewer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXTViewer-${{ github.sha }}
          path: DXTViewer.exe
          retention-days: 7
