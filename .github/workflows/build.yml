name: Build DXTViewer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile (PowerShell)
        run: |
          cl /O2 /EHsc /Fe:DXTViewer.exe main.cpp updater.cpp archive.cpp dxt.cpp gui.cpp logger.cpp /link gdiplus.lib winhttp.lib shlwapi.lib user32.lib gdi32.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DXTViewer-${{ github.sha }}
          path: DXTViewer.exe
          retention-days: 7
